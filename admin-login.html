<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - SMARTSERVICES Schools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
    .admin-login-container { background: white; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); padding: 40px; width: 100%; max-width: 420px; text-align: center; }
    .admin-login-logo { margin-bottom: 30px; }
    .admin-login-logo img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
    .admin-login-logo h1 { font-size: 1.5rem; color: #1e293b; margin: 0; font-weight: 800; }
    .admin-login-logo p { color: #64748b; margin: 5px 0 0; font-size: 0.9rem; }
    .auth-form .form-group { margin-bottom: 20px; text-align: left; }
    .auth-form label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
    .auth-form input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; box-sizing: border-box; }
    .auth-form input:focus { outline: none; border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,18,0.1); }
    .auth-form input::placeholder { color: #94a3b8; }
    .btn-admin-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-admin-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(249,115,18,0.3); }
    .error-message { background: #fef2f2; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 0.9rem; }
    .loading-spinner { display: none; }
    .loading-spinner.show { display: inline-block; }
    .info-text { font-size: 0.85rem; color: #64748b; margin-top: 20px; }
  </style>
</head>
<body>
  <div style="position: absolute; top: 15px; right: 15px;">
    <select id="langSelect" aria-label="Language" style="padding: 5px 10px; border-radius: 5px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 0.9rem; background: white; cursor: pointer;">
      <option value="fr">Français</option>
      <option value="ar">العربية</option>
      <option value="en">English</option>
    </select>
  </div>
  <div class="admin-login-container">
    <div class="admin-login-logo">
      <img src="images/Assets/logo2.png" alt="SMARTSERVICES Schools">
      <h1>SMARTSERVICES Schools</h1>
      <p data-i18n="adminLogin.subtitle">Espace Administration</p>
    </div>

    <div class="error-message" id="errorMessage">
      <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
    </div>

    <form id="adminLoginForm" class="auth-form" novalidate>
      <div class="form-group">
        <label for="adminEmail" data-i18n="adminLogin.emailLabel">Email</label>
        <input type="email" id="adminEmail" placeholder="votre@email.com" data-i18n-placeholder="adminLogin.emailLabel" required>
      </div>
      <div class="form-group">
        <label for="adminPassword" data-i18n="adminLogin.passwordLabel">Mot de passe</label>
        <input type="password" id="adminPassword" placeholder="Mot de passe" data-i18n-placeholder="adminLogin.passwordLabel" required>
      </div>
      <button type="submit" class="btn-admin-login">
        <span class="loading-spinner" id="loadingSpinner"><i class="fas fa-spinner fa-spin"></i></span>
        <span id="buttonText"><i class="fas fa-sign-in-alt"></i> <span data-i18n="adminLogin.loginBtn">Se connecter</span></span>
      </button>
    </form>
    <p class="info-text"><i class="fas fa-shield-alt"></i> <span data-i18n="adminLogin.accessRestricted">Accès réservé aux administrateurs</span></p>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    // ===== ADMIN LOGIN VIA SUPABASE AUTH + ROLE CHECK =====
    const ADMIN_ROLES = ['super_admin', 'sales_manager', 'operations_manager', 'support_agent', 'technician', 'account_manager'];

    document.addEventListener('DOMContentLoaded', async function() {
      // Check if already logged in with admin session
      const adminSession = localStorage.getItem('adminSession');
      if (adminSession) {
        try {
          const session = JSON.parse(adminSession);
          if (session.role && ADMIN_ROLES.includes(session.role)) {
            window.location.href = 'admin.html';
            return;
          }
        } catch(e) {}
      }

      // Initialize Supabase
      await window.__supabase.init();

      // Hydrate with existing auth session if admin role
      const supabase = window.__supabase.getClient();
      if (supabase) {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.user) {
          const { data: userProfile } = await supabase
            .from('users')
            .select('id, email, full_name, role, account_status')
            .eq('id', session.user.id)
            .single();

          if (userProfile && ADMIN_ROLES.includes(userProfile.role) && userProfile.account_status === 'active') {
            localStorage.setItem('adminSession', JSON.stringify(userProfile));
            window.location.href = 'admin.html';
            return;
          }
        }
      }
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      
      document.getElementById('loadingSpinner').classList.add('show');
      document.getElementById('buttonText').style.opacity = '0';

      try {
        const supabase = window.__supabase.getClient();
        if (!supabase) {
          showError(window.I18n ? window.I18n.t('adminLogin.errorUnavailable') : 'Service de connexion non disponible. Vérifiez la configuration Supabase.');
          return;
        }

        // Authenticate with Supabase Auth
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (authError) throw authError;
        if (!authData?.user) throw new Error(window.I18n ? window.I18n.t('adminLogin.errorAuthFail') : 'Échec de l\'authentification');

        // Verify admin role in database
        const { data: userProfile, error: profileError } = await supabase
          .from('users')
          .select('id, email, full_name, role, account_status')
          .eq('id', authData.user.id)
          .single();

        if (profileError) {
          // Profile might not exist yet, force create it
          if (authData.user.email) {
            await supabase.from('users').upsert({
              id: authData.user.id,
              email: authData.user.email,
              full_name: authData.user.user_metadata?.full_name || authData.user.email?.split('@')[0] || 'Admin',
              role: 'super_admin',
              account_status: 'active'
            }, { onConflict: 'id' });
            // Re-fetch
            const { data: retryProfile } = await supabase
              .from('users')
              .select('id, email, full_name, role, account_status')
              .eq('id', authData.user.id)
              .single();
            
            if (retryProfile && ADMIN_ROLES.includes(retryProfile.role)) {
              localStorage.setItem('adminSession', JSON.stringify(retryProfile));
              window.location.href = 'admin.html';
              return;
            }
          }
          throw new Error(window.I18n ? window.I18n.t('adminLogin.errorNoProfile') : 'Profil administrateur introuvable');
        }

        if (!ADMIN_ROLES.includes(userProfile.role)) {
          await supabase.auth.signOut();
          throw new Error(window.I18n ? window.I18n.t('adminLogin.errorNoAccess') : 'Accès refusé. Vous n\'avez pas les droits d\'administration.');
        }

        if (userProfile.account_status !== 'active') {
          await supabase.auth.signOut();
          throw new Error(window.I18n ? window.I18n.t('adminLogin.errorDisabled') : 'Compte désactivé. Contactez un super administrateur.');
        }

        // Store admin session
        localStorage.setItem('adminSession', JSON.stringify(userProfile));

        // Also store auth tokens for API calls
        if (authData.session?.access_token) {
          localStorage.setItem('auth_token', authData.session.access_token);
          localStorage.setItem('auth_user', JSON.stringify(userProfile));
        }

        window.location.href = 'admin.html';

      } catch (error) {
        document.getElementById('loadingSpinner').classList.remove('show');
        document.getElementById('buttonText').style.opacity = '1';
        let msg = error.message;
        if (msg && msg.includes('Invalid login credentials')) {
            msg = window.I18n ? window.I18n.t('adminLogin.errorLogin') : 'Erreur de connexion.';
        }
        showError(msg || (window.I18n ? window.I18n.t('adminLogin.errorLogin') : 'Erreur de connexion.'));
      }
    });

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      errorText.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
