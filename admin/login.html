<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SMARTSERVICES Schools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .login-logo p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(249,115,22,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-message {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.875rem;
    }
    .info-text {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
    }
    .spinner { display: none; }
    .spinner.show { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="../images/Assets/logo2.png" alt="SMARTSERVICES Schools">
      <h1>SMARTSERVICES</h1>
      <p data-i18n="admin.login.subtitle">Administrator Access</p>
    </div>

    <div class="error-message" id="errorMessage">
      <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email" data-i18n="admin.login.email">Email</label>
        <input type="email" id="email" placeholder="admin@school.com" required autocomplete="email" data-i18n-placeholder="admin.login.emailPlaceholder">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="admin.login.password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" data-i18n-placeholder="admin.login.passwordPlaceholder">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner" id="loginSpinner"><i class="fas fa-spinner"></i></span>
        <span id="loginText"><i class="fas fa-sign-in-alt"></i> <span data-i18n="admin.login.signIn">Sign In</span></span>
      </button>
    </form>
    <p class="info-text"><i class="fas fa-shield-alt"></i> <span data-i18n="admin.login.secure">Secure administrator authentication</span></p>
  </div>

  <script src="../js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Check if already logged in
      const session = localStorage.getItem('adminSession');
      if (session) {
        try {
          const parsed = JSON.parse(session);
          if (parsed.role === 'admin') {
            window.location.href = 'index.html';
            return;
          }
        } catch(e) {}
      }
    });

    // ===== HARDCODED ADMIN CREDENTIALS =====
    const ADMIN_EMAIL = 'admin@smartservices.ma';
    const ADMIN_PASSWORD = 'G12345678';
    const ADMIN_NAME = 'Super Admin';

    // ===== SUPABASE CONFIG =====
    const SUPABASE_URL = 'https://rsriyrvkizgnhvgsosgk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzcml5cnZraXpnbmh2Z3Nvc2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMzcxMjMsImV4cCI6MjA5ODkxMzEyM30.QkRn1oqI7UdDbi6LdJWlU8xrZXdFz7sqXxLqmxaUBy0';

    // ===== SIGN IN WITH SUPABASE AUTH =====
    async function signInWithSupabase(email, password) {
      // Load Supabase JS dynamically if not already loaded
      if (!window.supabase?.createClient) {
        await new Promise((resolve) => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
          script.onload = resolve;
          script.onerror = resolve;
          document.head.appendChild(script);
        });
      }
      if (!window.supabase?.createClient) return null;
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
      });
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        console.warn('Supabase Auth sign-in failed:', error.message);
        return null;
      }
      return data;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const text = document.getElementById('loginText');
      
      btn.disabled = true;
      spinner.classList.add('show');
      text.style.opacity = '0.5';
      
      try {
        let user = null;

        try {
          const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const result = await response.json();
          if (response.ok && result.success) {
            user = result.user;
          }
        } catch (e) {
          console.log('Server not available, using local auth');
        }

        if (!user) {
          if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            user = {
              id: 'admin-local',
              email: ADMIN_EMAIL,
              full_name: ADMIN_NAME,
              role: 'admin',
              account_status: 'active'
            };
          } else {
            throw new Error('Invalid email or password');
          }
        }

        localStorage.setItem('adminSession', JSON.stringify(user));

        // Also sign in with Supabase Auth so RLS policies work (auth.uid() will be set)
        await signInWithSupabase(email, password);

        window.location.href = 'index.html';

      } catch(error) {
        btn.disabled = false;
        spinner.classList.remove('show');
        text.style.opacity = '1';
        
        const errorEl = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = error.message || 'Invalid email or password';
        errorEl.style.display = 'block';
        setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
      }
    });
  </script>
</body>
</html>
